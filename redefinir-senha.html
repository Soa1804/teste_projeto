<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="style/login.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="assets/Logo_EngenhariaSoftware.png" alt="Logo Engenharia de Software" class="logo-img">
        </div>

        <div class="form-section">
            <h2>Criar Nova Senha</h2>
            <p class="instructions">Digite abaixo a sua nova senha para redefinir o acesso.</p>
            
            <form id="reset-form" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label for="new-password">Nova Senha</label>
                    <input type="password" id="new-password" required placeholder="Digite a nova senha">
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar Nova Senha</label>
                    <input type="password" id="confirm-password" required placeholder="Repita a nova senha">
                </div>

                <button type="submit" class="btn">Salvar Nova Senha</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/redefinirSenhaController.js"></script>
</body>
</html>
